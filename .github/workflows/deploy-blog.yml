name: Deploy Blog

# 当 main 分支有 push 时自动构建并部署
on:
  push:
    branches: [main]
  workflow_dispatch:  # 支持手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Hexo clean
        run: npx hexo clean

      - name: Hexo generate
        run: npx hexo generate

      - name: Deploy to server via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: public/
          remote_path: ${{ secrets.BLOG_DEPLOY_PATH }}
          remote_host: ${{ secrets.BLOG_SSH_HOST }}
          remote_user: ${{ secrets.BLOG_SSH_USER }}
          remote_port: ${{ secrets.BLOG_SSH_PORT }}
          remote_key: ${{ secrets.BLOG_SSH_KEY }}
